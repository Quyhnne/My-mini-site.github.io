<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dartsie Storybook</title>
    <style>
        /* =========================================
           1. THE DASHBOARD (Change stuff here!)
           ========================================= */
        :root {
            --bg-color: #121214;       /* The Room/Table color */
            --book-cover: #2c3e50;      /* The Cover color (Try #a570c4 for purple!) */
            --page-color: #fdf6e3;      /* The Paper color */
            --book-width: 500px;        /* How wide the book is */
            --book-height: 650px;       /* How tall the book is */
            --flip-speed: 1.2s;         /* How fast pages turn */
        }

        body {
            margin: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background: var(--bg-color); 
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* =========================================
           2. THE BOOK STRUCTURE
           ========================================= */
        .book {
            position: relative; 
            width: var(--book-width);
            height: var(--book-height);
            perspective: 2500px; /* Higher = more dramatic 3D */
        }

        .page {
            position: absolute; width: 100%; height: 100%;
            padding: 50px; box-sizing: border-box;
            background: var(--page-color); 
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 3px 0 20px rgba(0,0,0,0.1);
            transform-origin: left;
            transition: transform var(--flip-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            backface-visibility: hidden;
            user-select: none;
            overflow: hidden;
            border-radius: 0 5px 5px 0; /* Slight curve on page edges */
        }

        /* The 'Swing' animation */
        .page.flipped {
            transform: rotateY(-175deg);
            box-shadow: 15px 10px 30px rgba(0,0,0,0.5);
        }

        /* =========================================
           3. COVER & TEXTURES
           ========================================= */
        .cover {
            background-color: var(--book-cover) !important;
            color: white;
            z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* TEXTURE OVERLAYS (Makes it look real!) */
        .page::after {
            content: ""; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; opacity: 0.2; pointer-events: none;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
        }

        .cover::after {
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            opacity: 0.3;
        }

        /* THE IMAGE SLOT */
        .cover-art {
            width: 75%; height: 280px;
            margin-bottom: 30px;
            border: 8px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
            /* TIP: To add image: background-image: url('LINK'); */
        }

        /* STACKING ORDER (Don't touch unless adding pages) */
        .p1 { z-index: 5; } .p2 { z-index: 4; }
        .p3 { z-index: 3; } .p4 { z-index: 2; }

        h1 { font-size: 3rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #3e2723; line-height: 1.8; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="book">
        
        <div class="page p4">
            <h2 style="color: #5d4037;">The End</h2>
            <p>Start writing your finale here...</p>
        </div>

        <div class="page p3" onclick="flipPage(this)">
            <h2 style="color: #5d4037;">Chapter One</h2>
            <p>Every great story starts with a single line of code...</p>
        </div>

        <div class="page p1 cover" onclick="flipPage(this)">
            <div class="cover-art"></div>
            <h1>DARTSIDE</h1>
            <p style="color: rgba(255,255,255,0.7); font-style: italic;">The Storybook</p>
        </div>

    </div>

    <script>
        function flipPage(element) {
            element.classList.toggle('flipped');
        }
    </script>

</body>
</html>

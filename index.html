<!DOCTYPE html>
<html>
<head>
    <title>My Random Stuff</title>
    <style>
        body { 
            margin: 0; 
            font-family: sans-serif; 
            text-align: center; 
            /* Your Wallpaper Background */
            background-image: url('https://i.pinimg.com/736x/26/20/63/262063227ca7b46833f0c6dd34b7eadc.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        /* This creates that cool frosted glass box for your text */
        .overlap {
            background: rgba(255, 255, 255, 0.85); 
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15vh; /* Pushes it down so it's not stuck at the top */
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 80%;
        }

        h1 { color: #333; margin-bottom: 10px; }
        p { color: #555; font-size: 1.1rem; }

        .contact-btn {
            display: inline-block; 
            background: #007bff; 
            color: white; 
            padding: 12px 25px; 
            border-radius: 50px; 
            text-decoration: none; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .contact-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="overlap">
        <h1>Yaay! You found my Website</h1>
        <p>Here i just post random stuff because i cant think of anything in specific</p>
        <p>😊Enjoy!😊</p>
        
        <a href="mailto:yourname@email.com" class="contact-btn">Contact Me</a>
    </div>

</body>
</html>
